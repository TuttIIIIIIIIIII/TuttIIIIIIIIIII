<svg xmlns="http://www.w3.org/2000/svg" width="640" height="260" viewBox="0 0 640 260" font-family="'DotGothic16','Hiragino Kaku Gothic ProN','Hiragino Sans','Yu Gothic','MS Gothic',sans-serif">
  <rect x="2" y="2" width="636" height="256" rx="12" fill="#000"/>
  <rect x="8" y="8" width="624" height="244" rx="10" fill="none" stroke="#fff" stroke-width="5"/>
  <rect x="17" y="17" width="606" height="226" rx="7" fill="none" stroke="#fff" stroke-width="2"/>
  <g fill="#fff" font-size="20">
    <text x="48" y="68">*「Tutti は なかまに なりたそうに</text>
    <text x="90" y="102">こちらを みている!」</text>
    <text x="48" y="156">なかまに くわえて あげますか?</text>
    <text x="250" y="208">▶<animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1s" repeatCount="indefinite"/></text>
    <text x="280" y="208">はい</text>
    <text x="400" y="208">いいえ</text>
  </g>
</svg>
