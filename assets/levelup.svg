<svg xmlns="http://www.w3.org/2000/svg" width="640" height="230" viewBox="0 0 640 230" font-family="'DotGothic16','Hiragino Kaku Gothic ProN','Hiragino Sans','Yu Gothic','MS Gothic',sans-serif">
